name: Playwright CI-CD Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  # 🔘 Trigger 1: Adds a manual "Run workflow" button in the GitHub UI
  workflow_dispatch:

  # ⏰ Trigger 2: Runs automatically every night at midnight UTC (5:30 AM IST)
  schedule:
    - cron: '0 0 * * *'

jobs:
  # ─── CI STAGE: TEST ENVIRONMENT ───
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    # 📦 ULTIMATE OPTIMIZATION: Cache node_modules AND browser binaries together
    - name: Cache Node Modules & Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      # ⏭️ Skips this step completely if a perfect cache match is found
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npm ci
      
    - name: Install Playwright Browsers
      # ⏭️ Skips browser downloads entirely if the cache is restored
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test tests/describe.spec.ts --project=${{ matrix.browser }}

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

  # ─── CD STAGE: CONTINUOUS DELIVERY ───
  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v4

    - name: Deploying App Live
      run: |
        echo "🚀 Playwright Automation Tests Passed with flying colors!"
        echo "🌐 Initiating Continuous Deployment sequence..."
        echo "📦 Shipping production bundles to the cloud servers..."