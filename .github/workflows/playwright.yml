name: Playwright CI-CD Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── CI STAGE: TEST ENVIRONMENT ───
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test tests/describe.spec.ts # Running your stable file!

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # ─── CD STAGE: CONTINUOUS DEPLOYMENT ───
  deploy:
    name: Deploy to Production
    needs: test # 👈 CRITICAL: This makes sure deployment ONLY runs if tests pass!
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploying App Live
      run: |
        echo "🚀 Playwright Automation Tests Passed with flying colors!"
        echo "🌐 Initiating Continuous Deployment sequence..."
        echo "📦 Shipping production bundles to the cloud servers..."
        # In a real project, you would insert cloud deployment commands here, such as:
        # run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod