name: Playwright CI-CD Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  # 🔘 Trigger 1: Adds a manual "Run workflow" button in the GitHub UI
  workflow_dispatch:

  # ⏰ Trigger 2: Runs automatically every night at midnight UTC (5:30 AM IST)
  schedule:
    - cron: '0 0 * * *'

jobs:
  # ─── CI STAGE: TEST ENVIRONMENT ───
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    # 📦 Optimization: Cache Node Modules to save execution time
    - name: Cache Node Modules
      id: node-modules-cache
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      # This skips downloading node_modules if a perfect cache match is found!
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test tests/describe.spec.ts

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # ─── CD STAGE: CONTINUOUS DEPLOYMENT ───
  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v4

    - name: Deploying App Live
      run: |
        echo "🚀 Playwright Automation Tests Passed with flying colors!"
        echo "🌐 Initiating Continuous Deployment sequence..."
        echo "📦 Shipping production bundles to the cloud servers..."